[loggers]
keys=root,monitor,bot,ai,database

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=INFO
handlers=consoleHandler

[logger_monitor]
level=INFO
handlers=consoleHandler
qualname=monitor
propagate=0

[logger_bot]
level=INFO
handlers=consoleHandler
qualname=bot
propagate=0

[logger_ai]
level=INFO
handlers=consoleHandler
qualname=ai
propagate=0

[logger_database]
level=INFO
handlers=consoleHandler
qualname=database
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S